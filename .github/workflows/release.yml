name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Use HTTPS for public GitHub dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify release
        run: |
          npm audit --audit-level=low
          npm run verify

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## ${VERSION}$/{ found=1; next } /^## /{ if(found) exit } found" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}"
          fi
          # Write to file to avoid escaping issues
          echo "$BODY" > .release-body.md

      - name: Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          bodyFile: .release-body.md
          draft: false
          prerelease: false
          artifacts: ".scaffold/build/chat-pdf.xpi"
          artifactContentType: application/x-xpinstall
          allowUpdates: true
          removeArtifacts: true

      # Upload update.json to a fixed "release" tag so Zotero can always find it
      - name: Update release manifest
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: release
          name: "Update Manifest"
          body: "This release contains the update manifest for Zotero auto-update. Do not delete."
          draft: false
          prerelease: false
          artifacts: ".scaffold/build/update.json"
          allowUpdates: true
          removeArtifacts: true
