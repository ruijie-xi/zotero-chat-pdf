name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Resolve and validate version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${DISPATCH_VERSION#v}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release version $VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Use HTTPS for public GitHub dependencies
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify release
        run: |
          npm audit --audit-level=low
          npm run verify

      - name: Verify release artifacts and update manifest
        run: npm run verify:release -- --version "${{ steps.version.outputs.version }}"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          BODY=$(awk "/^## ${VERSION}$/{ found=1; next } /^## /{ if(found) exit } found" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}"
          fi
          # Write to file to avoid escaping issues
          echo "$BODY" > .release-body.md

      - name: Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          commit: ${{ github.sha }}
          name: v${{ steps.version.outputs.version }}
          bodyFile: .release-body.md
          draft: false
          prerelease: false
          makeLatest: true
          artifacts: ".scaffold/build/chat-pdf.xpi"
          artifactContentType: application/x-xpinstall
          allowUpdates: true
          removeArtifacts: true

      # Keep update.json at a fixed asset URL so every installed XPI can discover the next version.
      - name: Update release manifest
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: release
          commit: ${{ github.sha }}
          name: "Update Manifest"
          body: "This release contains the update manifest for Zotero auto-update. Do not delete."
          draft: false
          prerelease: true
          makeLatest: false
          artifacts: ".scaffold/build/update.json"
          allowUpdates: true
          removeArtifacts: true

      - name: Verify published auto-update chain
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          UPDATE_URL=$(node -p "require('./package.json').config.updateURL")
          XPI_URL=$(node -p "require('./package.json').config.xpiDownloadLink.replace('{{version}}', process.env.VERSION).replace('{{xpiName}}', require('./package.json').config.xpiName)")

          for ATTEMPT in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error --location --retry 3 --retry-all-errors "$UPDATE_URL" -o published-update.json \
              && cmp --silent published-update.json .scaffold/build/update.json; then
              break
            fi
            if [ "$ATTEMPT" = "6" ]; then
              echo "Published update manifest did not converge to the verified artifact" >&2
              exit 1
            fi
            sleep 10
          done

          curl --fail --silent --show-error --location --retry 5 --retry-all-errors "$XPI_URL" -o published.xpi
          cmp --silent published.xpi .scaffold/build/chat-pdf.xpi
