<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>

<groupbox>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-mineruToken" data-l10n-id="pref-mineru-token"></html:label>
    <html:input type="password" id="zotero-prefpane-__addonRef__-mineruToken" preference="mineruToken" style="flex: 1;" />
  </hbox>

  <separator class="thin" />

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-llmApiBase" data-l10n-id="pref-llm-api-base"></html:label>
    <html:input type="text" id="zotero-prefpane-__addonRef__-llmApiBase" preference="llmApiBase" style="flex: 1;" />
  </hbox>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-llmApiKey" data-l10n-id="pref-llm-api-key"></html:label>
    <html:input type="password" id="zotero-prefpane-__addonRef__-llmApiKey" preference="llmApiKey" style="flex: 1;" />
  </hbox>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-llmModel" data-l10n-id="pref-llm-model"></html:label>
    <html:input type="text" id="zotero-prefpane-__addonRef__-llmModel" preference="llmModel" style="flex: 1;" />
  </hbox>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-llmThinkingMode" data-l10n-id="pref-llm-thinking-mode"></html:label>
    <html:select id="zotero-prefpane-__addonRef__-llmThinkingMode" preference="llmThinkingMode" style="width: 130px;">
      <html:option value="default">Default</html:option>
      <html:option value="enabled">Enabled</html:option>
      <html:option value="disabled">Disabled</html:option>
    </html:select>
  </hbox>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-llmThinkEffort" data-l10n-id="pref-llm-think-effort"></html:label>
    <html:select id="zotero-prefpane-__addonRef__-llmThinkEffort" preference="llmThinkEffort" style="width: 130px;">
      <html:option value="default">Default</html:option>
      <html:option value="high">High</html:option>
      <html:option value="max">Max</html:option>
    </html:select>
  </hbox>

  <vbox style="margin-top: 4px;">
    <hbox align="center" style="margin-bottom: 4px;">
      <html:label data-l10n-id="pref-llm-test" style="font-weight: 600;"></html:label>
      <html:span style="flex: 1;" />
      <html:button id="zotero-prefpane-__addonRef__-llmTestBtn" style="font-size: 11px; padding: 1px 8px; cursor: pointer;">Test LLM</html:button>
    </hbox>
    <html:textarea id="zotero-prefpane-__addonRef__-llmTestPrompt"
      style="width: 100%; min-height: 48px; font-size: 12px; font-family: inherit; resize: vertical; box-sizing: border-box;"
      rows="2">Reply with exactly: ChatPDF LLM test OK.</html:textarea>
    <html:pre id="zotero-prefpane-__addonRef__-llmTestDebug"
      style="display: none; white-space: pre-wrap; max-height: 240px; overflow: auto; margin: 6px 0 0; padding: 8px; border: 1px solid var(--fill-quinary, #ddd); border-radius: 4px; font-size: 11px; background: var(--fill-senary, #f8f8f8);"></html:pre>
  </vbox>

  <separator class="thin" />

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-cacheDir" data-l10n-id="pref-cache-dir"></html:label>
    <html:input type="text" id="zotero-prefpane-__addonRef__-cacheDir" preference="cacheDir" style="flex: 1;" />
  </hbox>

  <!-- Model Profiles -->
  <vbox>
    <hbox align="center" style="margin-bottom: 4px;">
      <html:label data-l10n-id="pref-model-profiles" style="font-weight: 600;"></html:label>
      <html:span style="flex: 1;" />
      <html:button id="zotero-prefpane-__addonRef__-profileSaveBtn" style="font-size: 11px; padding: 1px 8px; cursor: pointer;">Save Current as Profile</html:button>
    </hbox>
    <html:div id="zotero-prefpane-__addonRef__-profileList" style="min-height: 32px; border: 1px solid var(--fill-quinary, #ddd); border-radius: 4px; margin-bottom: 4px; overflow-y: auto; max-height: 150px;"></html:div>
    <hbox align="center" style="gap: 4px;">
      <html:label for="zotero-prefpane-__addonRef__-profileName" data-l10n-id="pref-profile-name"></html:label>
      <html:input type="text" id="zotero-prefpane-__addonRef__-profileName" placeholder="Profile name..." style="flex: 1;" />
    </hbox>
    <html:span id="zotero-prefpane-__addonRef__-profileStatus" style="font-size: 11px; color: #34c759; min-height: 16px; display: block; margin-top: 2px;"></html:span>
  </vbox>

  <separator class="thin" />

  <vbox>
    <hbox align="center" style="margin-bottom: 4px;">
      <html:label data-l10n-id="pref-system-prompt" style="font-weight: 600;"></html:label>
      <html:span style="flex: 1;" />
      <html:button id="zotero-prefpane-__addonRef__-promptResetEN" style="font-size: 11px; padding: 1px 8px; cursor: pointer;">English Default</html:button>
      <html:button id="zotero-prefpane-__addonRef__-promptResetCN" style="font-size: 11px; margin-left: 4px; padding: 1px 8px; cursor: pointer;">中文默认</html:button>
    </hbox>
    <html:textarea id="zotero-prefpane-__addonRef__-systemPrompt"
      style="width: 100%; min-height: 120px; font-size: 12px; font-family: inherit; resize: vertical; box-sizing: border-box;"
      rows="6"></html:textarea>
    <hbox pack="end" style="margin-top: 4px;">
      <html:span id="zotero-prefpane-__addonRef__-promptStatus" style="font-size: 11px; color: #34c759; margin-right: 8px; align-self: center;"></html:span>
      <html:button id="zotero-prefpane-__addonRef__-promptSave" style="font-size: 12px; padding: 2px 16px; cursor: pointer; font-weight: 500;">Save</html:button>
    </hbox>
  </vbox>
  <separator class="thin" />

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-agentMaxIterations" data-l10n-id="pref-agent-max-iterations"></html:label>
    <html:input type="number" id="zotero-prefpane-__addonRef__-agentMaxIterations" preference="agentMaxIterations" style="width: 80px;" min="1" max="20" />
  </hbox>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-enableWebTools" data-l10n-id="pref-enable-web-tools"></html:label>
    <html:span style="flex: 1;" />
    <html:input type="checkbox" id="zotero-prefpane-__addonRef__-enableWebTools" preference="enableWebTools" />
  </hbox>

  <hbox align="center">
    <html:label for="zotero-prefpane-__addonRef__-braveSearchApiKey" data-l10n-id="pref-brave-search-api-key"></html:label>
    <html:input type="password" id="zotero-prefpane-__addonRef__-braveSearchApiKey" preference="braveSearchApiKey" style="flex: 1;" />
  </hbox>
</groupbox>
